<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Counter App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 300px;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        #count {
            font-size: 70px;
            margin: 20px 0;
            font-weight: bold;
            transition: 0.3s;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        button {
            flex: 1;
            margin: 5px;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .increase {
            background: #00c9a7;
            color: white;
        }

        .decrease {
            background: #ff6b6b;
            color: white;
        }

        .reset {
            background: #feca57;
            color: black;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Counter</h1>
        <div id="count">0</div>

        <div class="buttons">
            <button class="increase" onclick="increase()">+</button>
            <button class="decrease" onclick="decrease()">-</button>
            <button class="reset" onclick="reset()">⟳</button>
        </div>
    </div>

    <script>
        let count = 0;

        function updateDisplay() {
            document.getElementById("count").innerText = count;
        }

        function increase() {
            count++;
            updateDisplay();
        }

        function decrease() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }
    </script>

</body>
</html>
